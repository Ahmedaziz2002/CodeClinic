{% extends 'base.html' %}
{% block title %}Set New Password - CodeClinic{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded-[2rem] border border-white/10 bg-slate-900/80 p-8 shadow-2xl shadow-slate-950/40">
    <p class="text-sm uppercase tracking-[0.2em] text-cyan-300">New password</p>
    <h2 class="mt-3 text-3xl font-semibold text-white">Choose a new password</h2>
    <form method="POST" class="mt-8 space-y-4">
        {% csrf_token %}
        <input type="password" name="password" placeholder="New Password" required class="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-white placeholder:text-slate-500 focus:border-cyan-400 focus:outline-none">
        <input type="password" name="confirm_password" placeholder="Confirm New Password" required class="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-white placeholder:text-slate-500 focus:border-cyan-400 focus:outline-none">
        <button type="submit" class="w-full rounded-full bg-cyan-400 px-5 py-3 font-semibold text-slate-950 hover:bg-cyan-300">Update Password</button>
    </form>
</div>
{% endblock %}
