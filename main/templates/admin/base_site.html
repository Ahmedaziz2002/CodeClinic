{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin_custom.css' %}">
{% endblock %}

{% block branding %}

<div style="display:flex; align-items:center; gap:1rem; padding:1rem;">
    <img src="{% static 'images/codeclinic_logo.png' %}" alt="CodeClinic Logo" height="40">
    <h1 id="site-name" style="margin:0; font-family: 'Inter', sans-serif; font-weight: 600; color:#2C3E50;">
        CodeClinic Admin
    </h1>
</div>
{% endblock %}

{% block nav-global %}
<ul style="display:flex; gap:1rem; list-style:none; margin:0; padding:0;">
    <li><a href="{% url 'admin:index' %}">Dashboard</a></li>
    <li><a href="{% url 'myadmin:reports_dashboard' %}">View Reports</a></li>
    <li><a href="{% url 'admin:logout' %}">Log Out</a></li>
</ul>
{% endblock %}
