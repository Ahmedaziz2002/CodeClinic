{% extends 'base.html' %}
{% block title %}Reset Email Sent - CodeClinic{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl rounded-[2rem] border border-white/10 bg-slate-900/80 p-10 text-center shadow-2xl shadow-slate-950/40">
    <h2 class="text-3xl font-semibold text-white">Check your email</h2>
    <p class="mt-3 text-slate-300">If an account exists for that address, a password reset link has been sent.</p>
    <a href="{% url 'login' %}" class="mt-6 inline-flex rounded-full bg-cyan-400 px-6 py-3 font-semibold text-slate-950 hover:bg-cyan-300">Back to Login</a>
</div>
{% endblock %}
