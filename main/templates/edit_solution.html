{% extends "base.html" %}

{% block title %}Edit Solution{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl rounded-[2rem] border border-white/10 bg-slate-900/80 p-8 shadow-2xl shadow-slate-950/40">
    <h2 class="text-3xl font-semibold text-white">Edit Your Solution</h2>
    <form method="POST">
        {% csrf_token %}
        <textarea name="content" required class="mt-6 min-h-[240px] w-full rounded-3xl border border-white/10 bg-slate-950/80 px-5 py-4 text-white focus:border-cyan-400 focus:outline-none">{{ solution.content }}</textarea>
        <div class="mt-6 flex flex-wrap gap-3">
            <button type="submit" class="rounded-full bg-cyan-400 px-5 py-3 font-semibold text-slate-950 hover:bg-cyan-300">Update Solution</button>
            <a href="{% url 'problem_detail' solution.problem.id %}" class="rounded-full border border-white/10 px-5 py-3 text-slate-200 hover:border-white/30">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
